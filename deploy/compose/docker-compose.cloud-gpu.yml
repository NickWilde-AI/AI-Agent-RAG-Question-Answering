# 标准三容器：rag-api + colpali(GPU) + redis
#
# 要求：NVIDIA GPU + nvidia-container-toolkit
# 准备：
#   1. ./models/colpali-v1.3（scripts/download_colpali_model.py）
#   2. 自建索引时挂载 data/user_pages.json 与 kb_pages/
#   3. cp .env.example .env，填 OPENAI_*（或 vLLM 的 OPENAI_BASE_URL）
#
# 启动：
#   docker compose -f deploy/compose/docker-compose.cloud-gpu.yml up --build -d
#
# 访问：http://<IP>:8000/chat

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  colpali:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.colpali
    ports:
      - "9001:9001"
    environment:
      COLPALI_MODEL_DIR: /models/colpali-v1.3
    volumes:
      - ../../models/colpali-v1.3:/models/colpali-v1.3:ro
      - ../../kb_pages:/app/kb_pages:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  rag-api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      RAG_ENABLE_REAL_EMBEDDING: "false"
      RAG_ENABLE_MULTIMODAL_EMBEDDING: "false"
      RAG_ENABLE_COLPALI_RERANK: "true"
      RAG_COLPALI_RERANK_API: http://colpali:9001/rerank
      RAG_ENABLE_PLAN_EXECUTE_LOOP: "false"
      RAG_SESSION_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      RAG_ENABLE_SESSION_CACHE: "true"
    volumes:
      - ../../kb_pages:/app/kb_pages:ro
      # - ../../data/user_pages.json:/app/data/user_pages.json:ro
    depends_on:
      redis:
        condition: service_healthy
      colpali:
        condition: service_started
    restart: unless-stopped
