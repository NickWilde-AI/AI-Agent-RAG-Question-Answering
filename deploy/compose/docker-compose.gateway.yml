# 灰度网关示例：Traefik 按权重把流量分到 stable / canary
# 需先由 scripts/release_rollout.py 生成 data/release_rollout.json 并人工同步权重
services:
  traefik:
    image: traefik:v3.0
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --entrypoints.web.address=:8088
    ports:
      - "8088:8088"
    volumes:
      - ../traefik/dynamic:/etc/traefik/dynamic:ro

  rag-api-stable:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    environment:
      - RAG_ENABLE_LANGGRAPH=false
    expose:
      - "8000"

  rag-api-canary:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    environment:
      - RAG_ENABLE_LANGGRAPH=true
    expose:
      - "8000"
