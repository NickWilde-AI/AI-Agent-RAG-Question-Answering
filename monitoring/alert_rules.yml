groups:
  - name: rag-api-alerts
    rules:
      - alert: RagApiHighP99Latency
        expr: histogram_quantile(0.99, sum(rate(rag_request_latency_seconds_bucket[5m])) by (le)) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "RAG API p99 延迟过高"
          description: "最近 10 分钟 p99 已超过 5 秒"

      - alert: RagApiHighFallbackRate
        expr: (sum(rate(rag_fallback_total[10m])) / clamp_min(sum(rate(rag_requests_total[10m])), 1e-6)) > 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "fallback 触发率异常升高"
          description: "最近 10 分钟 fallback_rate 超过 15%"

      - alert: RagApiLowVerifierPassRate
        expr: (sum(rate(rag_verify_total{verified="true"}[10m])) / clamp_min(sum(rate(rag_verify_total[10m])), 1e-6)) < 0.75
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Verifier 通过率下降"
          description: "最近 10 分钟 verifier 通过率低于 75%"
