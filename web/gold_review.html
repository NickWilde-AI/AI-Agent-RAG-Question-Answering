<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>金标问答审核</title><style>
body{margin:0;background:#f4f7fb;color:#17233d;font:15px/1.55 system-ui,-apple-system,sans-serif}.wrap{max-width:1280px;margin:auto;padding:24px}.bar,.card{background:#fff;border:1px solid #dce4f1;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 4px 18px #2341a00b}.bar{display:flex;gap:16px;align-items:center;flex-wrap:wrap}.stats{display:flex;gap:10px}.pill{background:#edf3ff;padding:6px 11px;border-radius:999px}.grid{display:grid;grid-template-columns:minmax(360px,1fr) minmax(360px,1fr);gap:18px}.images img{width:100%;max-height:560px;object-fit:contain;background:#eef2f7;border-radius:10px;margin-bottom:10px}label{display:block;font-weight:650;margin:10px 0 4px}textarea,input,select{box-sizing:border-box;width:100%;border:1px solid #cbd6e7;border-radius:8px;padding:9px;background:#fff;font:inherit}textarea{min-height:92px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}button{border:0;border-radius:8px;padding:10px 16px;cursor:pointer}.accept{background:#176b3a;color:#fff}.reject{background:#ad2634;color:#fff}.skip{background:#e7edf7}.meta{color:#63708a;font-size:13px}.verified{color:#176b3a}.unverified{color:#ad2634}@media(max-width:850px){.grid{grid-template-columns:1fr}}
</style></head><body><div class="wrap"><div class="bar"><h2 style="margin:0">金标问答审核</h2><div class="stats" id="stats"></div><select id="status" style="width:auto"><option value="pending">待审核</option><option value="accepted">已接受</option><option value="rejected">已拒绝</option><option value="skipped">已跳过</option></select><button onclick="load()">刷新</button></div><div id="root"></div></div>
<script>
let items=[];const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function stat(s){document.querySelector('#stats').innerHTML=['pending','accepted','rejected','skipped'].map(k=>`<span class="pill">${{pending:'待审核',accepted:'已接受',rejected:'已拒绝',skipped:'跳过'}[k]} ${s[k]||0}</span>`).join('')}
async function load(){let status=document.querySelector('#status').value;let d=await fetch(`/api/candidates?status=${status}&limit=50`).then(r=>r.json());items=d.items;stat(d.stats);render()}
function render(){let root=document.querySelector('#root');if(!items.length){root.innerHTML='<div class="card">当前列表为空。</div>';return}root.innerHTML=items.map((x,i)=>`<div class="card"><div class="grid"><div class="images">${x.image_paths.map((_,j)=>`<img src="/api/candidates/${encodeURIComponent(x.id)}/image/${j}" alt="证据页">`).join('')}<div class="meta">${x.source_files.map(esc).join('<br>')}<br>页码：${x.page_nos.map(esc).join(', ')}<br>page_id：${x.gold_pages.map(esc).join(', ')}</div></div><div><div class="${x.model_verified?'verified':'unverified'}">模型校验：${x.model_verified?'通过':'未通过'}　${esc(x.model_reason)}</div><label>问题</label><textarea id="q${i}">${esc(x.query)}</textarea><label>标准答案</label><textarea id="a${i}">${esc(x.gold_answer)}</textarea><label>期望分支</label><select id="b${i}">${['fact_qa','chart_qa','multi_page_qa'].map(v=>`<option ${v===x.gold_branch?'selected':''}>${v}</option>`).join('')}</select><label>类别</label><input id="c${i}" value="${esc(x.category)}"><label>审核备注</label><input id="n${i}" value="${esc(x.reviewer_note)}"><div class="actions"><button class="accept" onclick="review(${i},'accepted')">接受/保存修改</button><button class="reject" onclick="review(${i},'rejected')">拒绝</button><button class="skip" onclick="review(${i},'skipped')">稍后处理</button></div></div></div></div>`).join('')}
async function review(i,status){let x=items[i],body={status,query:document.querySelector(`#q${i}`).value,gold_answer:document.querySelector(`#a${i}`).value,gold_branch:document.querySelector(`#b${i}`).value,category:document.querySelector(`#c${i}`).value,reviewer_note:document.querySelector(`#n${i}`).value};let r=await fetch(`/api/candidates/${encodeURIComponent(x.id)}/review`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});if(!r.ok){alert(await r.text());return}await load()}
document.querySelector('#status').addEventListener('change',load);load();
</script></body></html>
