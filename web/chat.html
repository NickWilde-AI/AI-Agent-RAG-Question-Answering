<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>企业智能问答台</title>
  <style>
    :root {
      --page-bg: #f2f4f8;
      --card-bg: #ffffff;
      --panel-bg: #f8faff;
      --text: #1f2329;
      --muted: #647086;
      --primary: #3370ff;
      --primary-2: #5b8bff;
      --border: #dce1ea;
      --ok: #00b578;
      --err: #f04438;
      --bot-bg: #f5f8ff;
      --user-bg: #e8f1ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--page-bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 18px;
    }
    .app {
      width: min(1120px, 100%);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(15, 35, 95, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: linear-gradient(180deg, #ffffff, #f9fbff);
    }
    .brand {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 5px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(180deg, #09c688, var(--ok));
      box-shadow: 0 0 0 5px rgba(0,181,120,0.15);
    }
    .title {
      font-size: 20px;
      font-weight: 700;
      margin: 0;
    }
    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .badge-row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .badge {
      border: 1px solid var(--border);
      color: #4b5b78;
      background: #f4f7ff;
      font-size: 12px;
      border-radius: 999px;
      padding: 5px 10px;
    }
    .api-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .api-row input {
      width: 300px;
      max-width: 70vw;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
    }
    .api-row input:focus,
    .toolbar input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(51,112,255,0.16);
    }
    .btn {
      background: linear-gradient(180deg, var(--primary-2), var(--primary));
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: .2px;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .content {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 64vh;
    }
    .side {
      border-right: 1px solid var(--border);
      padding: 14px 12px;
      background: var(--panel-bg);
    }
    .side h3 {
      margin: 0 0 10px;
      font-size: 13px;
      color: #2d3955;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .workspace-box { margin-bottom:18px; padding-bottom:16px; border-bottom:1px solid var(--border); }
    .workspace-box input,.workspace-box select,.research-panel textarea { width:100%; padding:9px; margin:5px 0; border:1px solid var(--border); border-radius:8px; background:#fff; }
    .mode-tabs { display:flex; gap:6px; padding:10px 18px 0; }
    .mode-tab { border:1px solid var(--border); background:#fff; padding:8px 14px; border-radius:8px; cursor:pointer; }
    .mode-tab.active { color:#fff; background:var(--primary); border-color:var(--primary); }
    .research-panel { padding:16px 20px; display:none; }
    .research-panel.active { display:block; }
    .research-panel textarea { min-height:100px; resize:vertical; }
    .job-card { border:1px solid var(--border); border-radius:12px; margin-top:12px; padding:14px; background:#fafcff; }
    .progress { height:8px; background:#e5e7eb; border-radius:8px; overflow:hidden; }.progress>i{display:block;height:100%;background:var(--primary)}
    .evidence-item { padding:8px 0; border-top:1px dashed var(--border); font-size:13px; }
    .conversation-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:12px 0 8px; }
    .conversation-list { display:flex; flex-direction:column; gap:5px; max-height:250px; overflow:auto; }
    .conversation-item { display:flex; align-items:center; gap:6px; border:1px solid transparent; border-radius:8px; padding:8px; cursor:pointer; color:#344054; }
    .conversation-item:hover,.conversation-item.active { background:#eef4ff; border-color:#c8dafe; }
    .conversation-title { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px; }
    .conversation-delete { border:0; background:transparent; color:var(--muted); cursor:pointer; }
    .event-timeline { margin-top:12px; border-left:2px solid #c8dafe; padding-left:12px; }
    .event-row { position:relative; padding:5px 0 8px; font-size:13px; color:#344054; }
    .event-row::before { content:""; position:absolute; width:8px; height:8px; border-radius:50%; background:var(--primary); left:-17px; top:10px; }
    .event-time { color:var(--muted); font-size:11px; margin-left:6px; }
    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      border: 1px solid var(--border);
      color: #45536f;
      background: #fff;
      font-size: 12px;
      border-radius: 10px;
      padding: 7px 10px;
      cursor: pointer;
      transition: all .12s ease-in;
    }
    .chip:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: #f3f7ff;
    }
    .chat {
      flex: 1;
      min-height: 44vh;
      overflow: auto;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #fff;
    }
    .msg {
      max-width: 86%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid transparent;
    }
    .msg.user {
      margin-left: auto;
      background: var(--user-bg);
      border-color: #c8dafe;
      color: #1c305f;
    }
    .msg.bot {
      background: var(--bot-bg);
      border-color: var(--border);
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .thinking-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      border-color: var(--border);
    }
    .spinner {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .main-col {
      display: flex;
      flex-direction: column;
      min-height: 64vh;
    }
    .msg.bundle.bot {
      max-width: 92%;
      padding: 0;
      border: none;
      background: transparent;
    }
    .answer-text {
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--bot-bg);
      border: 1px solid var(--border);
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .run-detail {
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fafcff;
      padding: 0 10px 8px;
      font-size: 12px;
      color: #3a4a63;
    }
    .run-detail > summary {
      cursor: pointer;
      padding: 8px 0;
      font-weight: 600;
      color: #2d3955;
      list-style: none;
    }
    .run-detail > summary::-webkit-details-marker { display: none; }
    .run-detail > summary::before {
      content: "▸ ";
      color: var(--primary);
    }
    .run-detail[open] > summary::before { content: "▾ "; }
    .run-dl {
      margin: 0;
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 4px 10px;
    }
    .run-dl dt {
      margin: 0;
      color: var(--muted);
      font-weight: 600;
    }
    .run-dl dd {
      margin: 0;
      word-break: break-word;
    }
    .hits-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-top: 6px;
    }
    .hits-table th, .hits-table td {
      border: 1px solid var(--border);
      padding: 4px 6px;
      text-align: left;
    }
    .hits-table th { background: #eef3ff; color: #2d3955; }
    .bubble-badges {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
    }
    .session-drawer {
      border-top: 1px solid var(--border);
      background: #f9fbff;
      max-height: 220px;
      overflow: auto;
      font-size: 12px;
    }
    .session-drawer > summary {
      cursor: pointer;
      padding: 10px 14px;
      font-weight: 600;
      color: #2d3955;
      list-style: none;
    }
    .session-drawer > summary::-webkit-details-marker { display: none; }
    .session-inner {
      padding: 0 14px 12px;
      color: var(--muted);
    }
    .session-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .btn-ghost {
      background: #fff;
      color: var(--primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .session-pre {
      margin: 0;
      padding: 8px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 120px;
      overflow: auto;
      font-size: 11px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .caps-line {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }
    .eval-panel {
      margin-top: 14px;
      border-top: 1px dashed var(--border);
      padding-top: 12px;
    }
    .eval-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .eval-log {
      margin: 0;
      padding: 8px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 140px;
      overflow: auto;
      font-size: 11px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--muted);
    }
    .trace-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-top: 6px;
    }
    .trace-table th, .trace-table td {
      border: 1px solid var(--border);
      padding: 4px 6px;
      text-align: left;
      vertical-align: top;
    }
    .trace-table th { background: #eef3ff; color: #2d3955; }
    .toolbar {
      border-top: 1px solid var(--border);
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      background: #fbfcff;
    }
    .toolbar input {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
    }
    .status {
      padding: 8px 14px 12px;
      color: var(--muted);
      font-size: 12px;
    }
    .ok { color: var(--ok); }
    .err { color: var(--err); }
    @media (max-width: 980px) {
      .content {
        grid-template-columns: 1fr;
      }
      .side {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <div class="brand">
          <span class="dot"></span>
          <h1 class="title">企业多模态研究 Agent</h1>
        </div>
        <p class="sub">日间模式 · Frontend 仅调用 FastAPI，发布由平台侧负责</p>
        <p id="capsLine" class="caps-line"></p>
        <div class="badge-row">
          <span class="badge">Agent Workflow</span>
          <span class="badge">RAG + Router + Verifier</span>
          <span class="badge">可追溯回答</span>
        </div>
      </div>
      <div class="api-row">
        <input id="apiBase" placeholder="FastAPI 地址，如 http://10.10.1.12:8000" />
        <button id="pingBtn" class="btn">连通性检查</button>
      </div>
    </div>

    <div class="content">
      <aside class="side">
        <div class="workspace-box">
          <h3>研究空间</h3>
          <select id="workspaceSelect"><option value="">未选择空间</option></select>
          <input id="workspaceName" placeholder="新空间名称" />
          <button class="btn-ghost" id="createWorkspaceBtn">创建空间</button>
          <input id="documentFile" type="file" />
          <button class="btn-ghost" id="uploadDocumentBtn">上传资料</button>
          <div id="documentList" class="meta">选择空间后显示资料</div>
        </div>
        <div class="conversation-head"><h3 style="margin:0">历史对话</h3><button class="btn-ghost" id="newConversationBtn">＋ 新对话</button></div>
        <div id="conversationList" class="conversation-list"><div class="meta">暂无历史对话</div></div>
        <h3>快速提问示例</h3>
        <div class="chip-list" id="quickList">
          <button class="chip" data-q="采购申请单的采购单号是多少？">采购单号</button>
          <button class="chip" data-q="2024Q3 经营分析里哪个产品线销售额最高？">经营分析</button>
          <button class="chip" data-q="谁负责介绍了实验/试点安排？">跨页人物</button>
          <button class="chip" data-q="系统支持哪些接口？">系统能力</button>
        </div>
        <div class="eval-panel">
          <h3>提测面板</h3>
          <div class="eval-actions">
            <button class="btn-ghost" id="runEvalBtn">运行评测</button>
            <button class="btn-ghost" id="loadEvalBtn">最近报告</button>
          </div>
          <pre id="evalLog" class="eval-log">尚未运行评测</pre>
        </div>
      </aside>
      <div class="main-col">
        <div class="mode-tabs"><button class="mode-tab active" data-mode="qa">即时问答</button><button class="mode-tab" data-mode="research">复杂研究</button></div>
        <div id="qaPanel"><div id="chat" class="chat"></div></div>
        <div id="researchPanel" class="research-panel">
          <textarea id="researchObjective" placeholder="例如：对比这些资料中的关键指标，找出差异和潜在风险，并给出引用依据。"></textarea>
          <button class="btn" id="submitResearchBtn">开始研究</button>
          <button class="btn-ghost" id="cancelResearchBtn" disabled>取消任务</button>
          <div id="researchResult" class="job-card">尚未提交研究任务</div>
        </div>
        <details class="session-drawer" id="sessionDrawer">
          <summary>本地会话与调试（仅存浏览器）</summary>
          <div class="session-inner">
            <p style="margin:0 0 8px;">服务端运行日志在仓库 <code>logs/api.log</code>；本面板仅保存你在本页发起的问答 JSON，便于复盘。</p>
            <div class="session-actions">
              <button type="button" class="btn-ghost" id="exportSession">导出 JSON</button>
              <button type="button" class="btn-ghost" id="clearSession">清空记录</button>
            </div>
            <pre id="sessionDump" class="session-pre">[]</pre>
          </div>
        </details>
      </div>
    </div>

    <div class="toolbar">
      <input id="question" placeholder="请输入你的问题，例如：采购申请单的采购单号是多少？" />
      <input id="topk" type="number" min="1" max="20" value="3" style="width:90px" />
      <button id="sendBtn" class="btn">发送</button>
    </div>
    <div id="status" class="status">就绪</div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const chatEl = $("chat");
    const statusEl = $("status");
    const apiBaseEl = $("apiBase");
    const qEl = $("question");
    const topkEl = $("topk");
    const sendBtn = $("sendBtn");
    const pingBtn = $("pingBtn");
    const quickList = $("quickList");
    const capsLine = $("capsLine");
    const sessionDump = $("sessionDump");
    const exportSessionBtn = $("exportSession");
    const clearSessionBtn = $("clearSession");
    const runEvalBtn = $("runEvalBtn");
    const loadEvalBtn = $("loadEvalBtn");
    const evalLog = $("evalLog");
    const workspaceSelect=$("workspaceSelect"), documentList=$("documentList"), researchResult=$("researchResult"), conversationList=$("conversationList");
    let currentJobId="", pollTimer=null, eventSource=null, researchEvents=[], currentConversationId="";

    const SESSION_KEY = "rag_chat_session_v1";
    const CLIENT_SESSION_ID_KEY = "rag_chat_client_session_id_v1";
    const clientSessionId = localStorage.getItem(CLIENT_SESSION_ID_KEY) || ("web-" + (globalThis.crypto?.randomUUID ? globalThis.crypto.randomUUID() : Math.random().toString(36).slice(2, 14)));
    localStorage.setItem(CLIENT_SESSION_ID_KEY, clientSessionId);

    const urlBaseFromQuery = new URLSearchParams(location.search).get("api");
    const defaultBase = location.protocol === "file:" ? "http://127.0.0.1:8000" : location.origin;
    apiBaseEl.value = urlBaseFromQuery || localStorage.getItem("chat_api_base") || defaultBase;

    function setStatus(text, level = "") {
      statusEl.className = "status " + level;
      statusEl.textContent = text;
    }

    function getBase() {
      const base = apiBaseEl.value.trim().replace(/\/$/, "");
      localStorage.setItem("chat_api_base", base);
      return base;
    }

    async function loadWorkspaces() {
      try {
        const rows=await (await fetch(getBase()+"/workspaces")).json(); const selected=workspaceSelect.value;
        workspaceSelect.innerHTML='<option value="">未选择空间</option>';
        rows.forEach(w=>{const o=document.createElement("option");o.value=w.workspace_id;o.textContent=w.name+" ("+w.document_count+")";workspaceSelect.appendChild(o)});
        if(rows.some(w=>w.workspace_id===selected)) workspaceSelect.value=selected;
        await loadDocuments();
      } catch(e){ documentList.textContent="空间加载失败："+e.message; }
    }
    async function loadDocuments(){ const id=workspaceSelect.value;if(!id){documentList.textContent="未选择空间";return} const rows=await (await fetch(getBase()+`/workspaces/${id}/documents`)).json();documentList.textContent=rows.length?rows.map(x=>`${x.file_name} · ${x.status} · ${x.page_count}页`).join("\n"):"当前使用 demo 资料，可继续上传"; }
    async function loadConversations(){try{const rows=await (await fetch(getBase()+`/conversations?client_id=${encodeURIComponent(clientSessionId)}`)).json();conversationList.innerHTML="";if(!rows.length){conversationList.innerHTML='<div class="meta">暂无历史对话</div>';return}rows.forEach(c=>{const row=document.createElement("div");row.className="conversation-item"+(c.conversation_id===currentConversationId?" active":"");row.dataset.id=c.conversation_id;row.dataset.workspace=c.workspace_id||"";const title=document.createElement("span");title.className="conversation-title";title.textContent=c.title;const del=document.createElement("button");del.className="conversation-delete";del.textContent="×";del.title="删除对话";row.append(title,del);conversationList.appendChild(row)})}catch(e){conversationList.innerHTML=`<div class="meta">历史加载失败：${escapeHtml(e.message)}</div>`}}
    function clearChat(){chatEl.innerHTML=""}
    function welcome(){appendBotBundle("你好，我是企业多模态研究 Agent。你可以直接提问，也可以切换到复杂研究模式查看实时执行轨迹。",{branch:"—",verified:true,cost_ms:0,rewritten_query:"—",hits:[]})}
    async function createConversation(){const r=await fetch(getBase()+"/conversations",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({client_id:clientSessionId,workspace_id:workspaceSelect.value||null,title:"新对话"})});if(!r.ok)throw new Error(await r.text());const c=await r.json();currentConversationId=c.conversation_id;clearChat();welcome();await loadConversations();return c}
    async function ensureConversation(){if(!currentConversationId)await createConversation();return currentConversationId}
    async function openConversation(id,workspace){currentConversationId=id;if(workspace&&Array.from(workspaceSelect.options).some(x=>x.value===workspace)){workspaceSelect.value=workspace;await loadDocuments()}const r=await fetch(getBase()+`/conversations/${id}/messages?client_id=${encodeURIComponent(clientSessionId)}`);if(!r.ok)throw new Error(await r.text());const rows=await r.json();clearChat();if(!rows.length)welcome();rows.forEach(m=>{if(m.role==="user")appendUserMessage(m.content,m.payload?.topk||3);else appendBotBundle(m.content,m.payload||{})});await loadConversations()}
    async function createWorkspace(){const name=$("workspaceName").value.trim();if(!name)return;const r=await fetch(getBase()+"/workspaces",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,use_demo:true})});const w=await r.json();await loadWorkspaces();workspaceSelect.value=w.workspace_id;await loadDocuments();}
    async function uploadDocument(){const id=workspaceSelect.value,file=$("documentFile").files[0];if(!id||!file){setStatus("请先选择空间和文件","err");return}const fd=new FormData();fd.append("file",file);setStatus("资料入库中...");const r=await fetch(getBase()+`/workspaces/${id}/documents`,{method:"POST",body:fd});if(!r.ok)throw new Error(await r.text());await loadWorkspaces();setStatus("资料已入库","ok");}
    function evidenceHtml(plan){return plan.flatMap(s=>(s.evidence||[]).map(e=>`<div class="evidence-item"><b>${escapeHtml(e.file_name)}</b> · ${e.page_no==null?escapeHtml(e.page_id):"p."+e.page_no}<br>${escapeHtml(e.excerpt||"")}</div>`)).join("")}
    function escapeHtml(s){const d=document.createElement("div");d.textContent=String(s||"");return d.innerHTML}
    function timelineHtml(){return `<div class="event-timeline">${researchEvents.map(e=>`<div class="event-row">${escapeHtml(e.message)}<span class="event-time">${escapeHtml(e.stage)} · ${e.progress}%</span></div>`).join("")||'<div class="meta">等待执行事件…</div>'}</div>`}
    async function pollJob(){if(!currentJobId)return;const r=await fetch(getBase()+`/research/jobs/${currentJobId}`);if(!r.ok)return;const j=await r.json();researchResult.innerHTML=`<b>${escapeHtml(j.status)} · ${j.progress}%</b><div class="progress"><i style="width:${j.progress}%"></i></div>${timelineHtml()}<details><summary>计划与步骤</summary>${(j.plan||[]).map(s=>`<p>${escapeHtml(s.title)} · ${escapeHtml(s.tool_name)} · ${escapeHtml(s.status)} · ${s.verified?"已验证":"待验证"}</p>`).join("")}</details><details><summary>页级证据</summary>${evidenceHtml(j.plan||[])||"暂无证据"}</details>`;if(j.status==="completed"){clearInterval(pollTimer);if(eventSource)eventSource.close();researchResult.innerHTML+=`<p><a target="_blank" href="${getBase()}/research/jobs/${currentJobId}/report.html">查看 HTML 报告</a> · <a href="${getBase()}/research/jobs/${currentJobId}/report.md">下载 Markdown</a></p>`}else if(["failed","cancelled"].includes(j.status)){clearInterval(pollTimer);if(eventSource)eventSource.close()}}
    function startEventStream(jobId){if(eventSource)eventSource.close();eventSource=new EventSource(getBase()+`/research/jobs/${jobId}/events`);const types=["job_created","planning_started","plan_created","step_started","retrieval_completed","verification_passed","verification_failed","step_completed","step_failed","report_started","job_completed","job_failed","job_cancelled"];types.forEach(type=>eventSource.addEventListener(type,e=>{try{const item=JSON.parse(e.data);if(!researchEvents.some(x=>x.sequence_no===item.sequence_no))researchEvents.push(item);pollJob()}catch(_){}}));eventSource.onerror=()=>setStatus("执行事件流暂时断开，正在自动重连…","err")}
    async function submitResearch(){const workspace_id=workspaceSelect.value,objective=$("researchObjective").value.trim();if(!workspace_id||!objective){setStatus("请选择空间并填写研究目标","err");return}const r=await fetch(getBase()+"/research/jobs",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({workspace_id,objective,session_id:clientSessionId})});if(!r.ok)throw new Error(await r.text());currentJobId=(await r.json()).job_id;researchEvents=[];$("cancelResearchBtn").disabled=false;startEventStream(currentJobId);pollTimer=setInterval(pollJob,2000);pollJob()}

    function loadSession() {
      try {
        return JSON.parse(localStorage.getItem(SESSION_KEY) || "[]");
      } catch (e) {
        return [];
      }
    }

    function saveSessionEntry(entry) {
      const arr = loadSession();
      arr.push(entry);
      while (arr.length > 40) arr.shift();
      localStorage.setItem(SESSION_KEY, JSON.stringify(arr, null, 0));
      sessionDump.textContent = JSON.stringify(arr, null, 2);
    }

    function renderSessionDump() {
      sessionDump.textContent = JSON.stringify(loadSession(), null, 2);
    }

    function appendUserMessage(query, topk) {
      const wrap = document.createElement("div");
      wrap.className = "msg user";
      const t = document.createElement("div");
      t.textContent = query;
      const b = document.createElement("div");
      b.className = "bubble-badges";
      b.textContent = "检索深度 top-k = " + topk;
      wrap.appendChild(t);
      wrap.appendChild(b);
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function appendThinkingPlaceholder() {
      removeThinkingPlaceholder();
      const wrap = document.createElement("div");
      wrap.className = "msg bot thinking-row";
      wrap.id = "thinking-placeholder";
      const sp = document.createElement("div");
      sp.className = "spinner";
      const tx = document.createElement("span");
      tx.textContent = "正在检索并生成回答…";
      wrap.appendChild(sp);
      wrap.appendChild(tx);
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function removeThinkingPlaceholder() {
      const el = document.getElementById("thinking-placeholder");
      if (el) el.remove();
    }

    function appendBotBundle(answer, detail) {
      const wrap = document.createElement("div");
      wrap.className = "msg bot bundle";

      const main = document.createElement("div");
      main.className = "answer-text";
      main.textContent = answer || "(空响应)";

      const det = document.createElement("details");
      det.className = "run-detail";
      const sum = document.createElement("summary");
      sum.textContent = "检索与运行详情";
      const body = document.createElement("div");

      const dl = document.createElement("dl");
      dl.className = "run-dl";

      function addRow(label, value) {
        const dt = document.createElement("dt");
        dt.textContent = label;
        const dd = document.createElement("dd");
        dd.textContent = value == null ? "" : String(value);
        dl.appendChild(dt);
        dl.appendChild(dd);
      }

      addRow("分支", detail.branch);
      addRow("证据校验", detail.verified ? "通过" : "未通过");
      addRow("耗时", (detail.cost_ms != null ? detail.cost_ms + " ms" : ""));
      addRow("改写 query", detail.rewritten_query || "");
      if (detail.source_files && detail.source_files.length) {
        addRow("依据文档（完整文件名）", detail.source_files.join("、"));
      }

      if (detail.hits && detail.hits.length) {
        const dt = document.createElement("dt");
        dt.textContent = "命中页";
        const dd = document.createElement("dd");
        const tbl = document.createElement("table");
        tbl.className = "hits-table";
        const trh = document.createElement("tr");
        ["page_id", "score"].forEach((h) => {
          const th = document.createElement("th");
          th.textContent = h;
          trh.appendChild(th);
        });
        tbl.appendChild(trh);
        detail.hits.forEach((h) => {
          const tr = document.createElement("tr");
          ["page_id", "score"].forEach((k) => {
            const td = document.createElement("td");
            td.textContent = h[k] != null ? String(h[k]) : "";
            tr.appendChild(td);
          });
          tbl.appendChild(tr);
        });
        dd.appendChild(tbl);
        dl.appendChild(dt);
        dl.appendChild(dd);
      }

      if (detail.retry_hits && detail.retry_hits.length) {
        const dt = document.createElement("dt");
        dt.textContent = "扩召回";
        const dd = document.createElement("dd");
        dd.textContent = JSON.stringify(detail.retry_hits);
        dl.appendChild(dt);
        dl.appendChild(dd);
      }

      if (detail.loop_steps && detail.loop_steps.length) {
        const dt = document.createElement("dt");
        dt.textContent = "Agent Loop";
        const dd = document.createElement("dd");
        dd.textContent = JSON.stringify(detail.loop_steps, null, 2);
        dl.appendChild(dt);
        dl.appendChild(dd);
      }

      if (detail.trace) {
        addRow("路由分支", detail.trace.route_branch || "");
        addRow("是否回退", detail.trace.fallback_triggered ? "是" : "否");
        addRow("重试原因", detail.trace.retry_reason || "none");
        if (detail.trace.stages && detail.trace.stages.length) {
          const dt = document.createElement("dt");
          dt.textContent = "阶段耗时";
          const dd = document.createElement("dd");
          const tbl = document.createElement("table");
          tbl.className = "trace-table";
          const trh = document.createElement("tr");
          ["stage", "elapsed_ms", "detail"].forEach((h) => {
            const th = document.createElement("th");
            th.textContent = h;
            trh.appendChild(th);
          });
          tbl.appendChild(trh);
          detail.trace.stages.forEach((st) => {
            const tr = document.createElement("tr");
            const td1 = document.createElement("td");
            td1.textContent = st.stage || "";
            const td2 = document.createElement("td");
            td2.textContent = String(st.elapsed_ms ?? "");
            const td3 = document.createElement("td");
            td3.textContent = JSON.stringify(st.detail || {});
            tr.appendChild(td1);
            tr.appendChild(td2);
            tr.appendChild(td3);
            tbl.appendChild(tr);
          });
          dd.appendChild(tbl);
          dl.appendChild(dt);
          dl.appendChild(dd);
        }
      }

      body.appendChild(dl);
      det.appendChild(sum);
      det.appendChild(body);
      wrap.appendChild(main);
      wrap.appendChild(det);
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    async function refreshCaps() {
      const base = getBase();
      capsLine.textContent = "";
      try {
        const r = await fetch(base + "/capabilities", { method: "GET" });
        if (!r.ok) return;
        const c = await r.json();
        const parts = [];
        parts.push(c.colpali_rerank ? "ColPali rerank 已启用" : "ColPali rerank 未启用");
        parts.push(c.multimodal_embedding ? "多模态 embedding 已配置" : "多模态 embedding 未配置（启动脚本为秒开关闭了远程 embedding）");
        capsLine.textContent = parts.join(" · ");
      } catch (e) {
        capsLine.textContent = "";
      }
    }

    async function ping() {
      const base = getBase();
      setStatus("检查中...");
      try {
        const r = await fetch(base + "/health", { method: "GET" });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const data = await r.json();
        setStatus("连通成功: " + JSON.stringify(data), "ok");
        await refreshCaps();
      } catch (e) {
        setStatus("连通失败: " + e.message + "（若跨域，请让后端放通 CORS）", "err");
      }
    }

    async function ask() {
      const query = qEl.value.trim();
      if (!query) return;

      const topk = Math.max(1, Math.min(20, Number(topkEl.value || 3)));
      const base = getBase();
      sendBtn.disabled = true;
      const t0 = Date.now();
      try {
        await ensureConversation();
        appendUserMessage(query, topk);
        appendThinkingPlaceholder();
        setStatus("正在请求 /ask ...");
        const r = await fetch(base + "/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query, topk, session_id: currentConversationId, client_id: clientSessionId, conversation_id: currentConversationId, workspace_id: workspaceSelect.value || null })
        });
        if (!r.ok) {
          const t = await r.text();
          throw new Error("HTTP " + r.status + " " + t);
        }
        const data = await r.json();
        removeThinkingPlaceholder();
        appendBotBundle(data.answer, data);
        const entry = {
          ts: new Date().toISOString(),
          query,
          topk,
          client_latency_ms: Date.now() - t0,
          response: data,
        };
        saveSessionEntry(entry);
        await loadConversations();
        setStatus("请求成功", "ok");
      } catch (e) {
        removeThinkingPlaceholder();
        const errText = "请求失败: " + e.message;
        const wrap = document.createElement("div");
        wrap.className = "msg bot";
        wrap.textContent = errText;
        chatEl.appendChild(wrap);
        chatEl.scrollTop = chatEl.scrollHeight;
        saveSessionEntry({ ts: new Date().toISOString(), query, topk, error: errText });
        setStatus(errText, "err");
      } finally {
        removeThinkingPlaceholder();
        sendBtn.disabled = false;
        qEl.focus();
      }
    }

    sendBtn.addEventListener("click", ask);
    pingBtn.addEventListener("click", ping);
    runEvalBtn.addEventListener("click", async () => {
      const base = getBase();
      evalLog.textContent = "评测运行中...";
      try {
        const r = await fetch(base + "/eval/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ persist: true, tag: "web-ui" })
        });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const data = await r.json();
        evalLog.textContent = JSON.stringify(data, null, 2);
        setStatus("评测完成并已落盘", "ok");
      } catch (e) {
        evalLog.textContent = "评测失败: " + e.message;
        setStatus("评测失败: " + e.message, "err");
      }
    });
    loadEvalBtn.addEventListener("click", async () => {
      const base = getBase();
      try {
        const r = await fetch(base + "/eval/last", { method: "GET" });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const data = await r.json();
        evalLog.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        evalLog.textContent = "读取失败: " + e.message;
      }
    });
    exportSessionBtn.addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(loadSession(), null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "rag_chat_session.json";
      a.click();
      URL.revokeObjectURL(a.href);
    });
    clearSessionBtn.addEventListener("click", () => {
      localStorage.removeItem(SESSION_KEY);
      renderSessionDump();
    });
    quickList.addEventListener("click", (e) => {
      const target = e.target;
      if (target && target.dataset && target.dataset.q) {
        qEl.value = target.dataset.q;
        qEl.focus();
      }
    });
    qEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") ask();
    });
    apiBaseEl.addEventListener("change", () => {
      refreshCaps();
      loadWorkspaces();
    });
    $("createWorkspaceBtn").addEventListener("click",createWorkspace);workspaceSelect.addEventListener("change",loadDocuments);$("uploadDocumentBtn").addEventListener("click",()=>uploadDocument().catch(e=>setStatus(e.message,"err")));$("submitResearchBtn").addEventListener("click",()=>submitResearch().catch(e=>setStatus(e.message,"err")));$("cancelResearchBtn").addEventListener("click",async()=>{if(currentJobId)await fetch(getBase()+`/research/jobs/${currentJobId}/cancel`,{method:"POST"});pollJob()});
    $("newConversationBtn").addEventListener("click",()=>createConversation().catch(e=>setStatus(e.message,"err")));conversationList.addEventListener("click",e=>{const row=e.target.closest(".conversation-item");if(!row)return;if(e.target.classList.contains("conversation-delete")){fetch(getBase()+`/conversations/${row.dataset.id}?client_id=${encodeURIComponent(clientSessionId)}`,{method:"DELETE"}).then(()=>{if(currentConversationId===row.dataset.id){currentConversationId="";clearChat();welcome()}loadConversations()});return}openConversation(row.dataset.id,row.dataset.workspace).catch(err=>setStatus(err.message,"err"))});workspaceSelect.addEventListener("change",()=>{if(currentConversationId){currentConversationId="";clearChat();welcome();loadConversations()}});
    document.querySelectorAll(".mode-tab").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll(".mode-tab").forEach(x=>x.classList.toggle("active",x===b));$("qaPanel").style.display=b.dataset.mode==="qa"?"block":"none";$("researchPanel").classList.toggle("active",b.dataset.mode==="research");document.querySelector(".toolbar").style.display=b.dataset.mode==="qa"?"flex":"none";}));

    renderSessionDump();
    refreshCaps();
    loadWorkspaces();
    loadConversations();

    appendBotBundle("你好，我是企业多模态研究 Agent。左侧会自动保存历史对话；复杂研究模式会实时展示规划、检索、工具执行、证据校验和报告生成过程。", {
      branch: "—",
      verified: true,
      cost_ms: 0,
      rewritten_query: "—",
      hits: [],
      retry_hits: null,
      loop_steps: null,
    });
  </script>
</body>
